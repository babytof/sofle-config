<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sofle — couches 0–8</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0.75rem 0;
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: system-ui, sans-serif;
    }
    figure {
      margin: 0 0 1.5rem;
      padding: 0 0.5rem;
    }
    figcaption {
      font-size: 0.85rem;
      margin-bottom: 0.35rem;
      opacity: 0.85;
    }
    figure img {
      display: block;
      width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <figure>
    <figcaption>0 — QWERTY (principal)</figcaption>
    <img src="sofle-layer0-main.svg" alt="Couche QWERTY" width="900" height="428" loading="lazy" />
  </figure>
  <figure>
    <figcaption>1 — Navigation</figcaption>
    <img src="sofle-layer1-navigation.svg" alt="Couche Navigation" width="900" height="428" loading="lazy" />
  </figure>
  <figure>
    <figcaption>2 — Numbers</figcaption>
    <img src="sofle-layer2-numbers.svg" alt="Couche Numbers" width="900" height="428" loading="lazy" />
  </figure>
  <figure>
    <figcaption>3 — Symbols</figcaption>
    <img src="sofle-layer3-symbols.svg" alt="Couche Symbols" width="900" height="428" loading="lazy" />
  </figure>
  <figure>
    <figcaption>4 — Media</figcaption>
    <img src="sofle-layer4-media.svg" alt="Couche Media" width="900" height="428" loading="lazy" />
  </figure>
  <figure>
    <figcaption>5 — Mouse</figcaption>
    <img src="sofle-layer5-mouse.svg" alt="Couche Mouse" width="900" height="428" loading="lazy" />
  </figure>
  <figure>
    <figcaption>6 — Functions</figcaption>
    <img src="sofle-layer6-functions.svg" alt="Couche Functions" width="900" height="428" loading="lazy" />
  </figure>
  <figure>
    <figcaption>7 — Buttons</figcaption>
    <img src="sofle-layer7-buttons.svg" alt="Couche Buttons" width="900" height="428" loading="lazy" />
  </figure>
  <figure>
    <figcaption>8 — System</figcaption>
    <img src="sofle-layer8-system.svg" alt="Couche System" width="900" height="428" loading="lazy" />
  </figure>
  <figure>
    <figcaption>Référence — indices matrice RC et paramètres K (SOFLE60)</figcaption>
    <img src="sofle-layer-rc-reference.svg" alt="Référence RC et K00–K65" width="900" height="428" loading="lazy" />
  </figure>

</html>
