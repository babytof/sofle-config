# Kconfig utilisateur — Sofle Choc Pro BT (board sofle_choc_pro_* + shield nice_view_disp).
# S’applique aux builds left/right (BOARD_DIR_NAME = sofle_choc_pro).

CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_BLE=y

# Couche souris (standard_layout.dtsi)
CONFIG_ZMK_MOUSE=y

# KeyPeek / ZMK Studio RPC (moitié gauche : snippet studio-rpc-usb-uart + raw_hid_adapter)
CONFIG_ZMK_STUDIO=y

