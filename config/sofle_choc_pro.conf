# Kconfig utilisateur — Sofle Choc Pro BT (board sofle_choc_pro_* + shield nice_view_disp).
# S’applique aux builds left/right (BOARD_DIR_NAME = sofle_choc_pro).

CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_BLE=y

# Couche souris (keymap Townk / standard_layout.dtsi)
CONFIG_ZMK_MOUSE=y

# ZMK Studio : non supporté sur le fork Townk (mousemove-molock) sans passer à ZMK officiel.
# CONFIG_ZMK_STUDIO=y

# Affichage : déjà activé par boards/shields/nice_view_disp/nice_view_disp.conf
# CONFIG_ZMK_DISPLAY=y
# CONFIG_ZMK_WIDGET_STATUS=y
# CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
