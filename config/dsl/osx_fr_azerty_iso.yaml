behaviors:
  tap:
    type: kp
  mod_tap:
    type: mt
    params:
      hold: required
      target: required
  hold_tap:
    type: hold_tap
    params:
      flavor: optional
      hold: required
      tap: required
    note: Prévoir homologue ZMK &hml / &hmr / &mt / &lt selon le cas.
  layer_tap:
    type: layer_tap
    params:
      layer: required
      tap: required
    note: Ex. '&lt L_SYM ESC'
  mod_morph:
    type: mod_morph
    params:
      bindings: required
      mods: required
    note: Ex. lbktgrave, globebslh (standard_layout.dtsi).
  behavior_ref:
    type: zmk_node
    params:
      ref: required
    note: Référence telle quelle vers un behavior défini dans le devicetree (ex. '&bspcnav').
  macro_ref:
    type: macro
    params:
      target: required
  special_ref:
    type: special
    params:
      target: required
aliases_collision_audit:
  description: Paires d’alias distincts partageant le même HID — intentionnel pour tap/shift ou à documenter.
  shared_hid:
  - keys:
    - HASH
    - AT
    hid: GRAVE
    note: Tap vs shift sur la même touche (CSV GRAVE @ / #).
  - keys:
    - EXCL
    - SECTION
    hid: SLASH
    note: Tap vs shift (CSV FSLH ! / §).
  - keys:
    - COMMA
    - SEMICOLON
    hid: M
    note: Tap vs shift.
  - keys:
    - DOT
    - COLON
    hid: DOT
    note: Tap vs shift.
  - keys:
    - DOLLAR
    - ASTERISK
    hid: BSLH
    note: Tap vs shift.
  - keys:
    - BACKSLASH
    - PIPE
    hid: NON_US_BSLH
    note: Tap vs shift.
  - keys:
    - RPAR
    - DEGREE
    hid: MINUS
    note: Tap vs shift.
  - keys:
    - EQUAL
    - PLUS
    hid: EQUAL
    note: Tap vs shift.
  resolved_distinct_hid:
  - note: PERCENT utilise désormais PRCNT ; UGRAVE utilise SQT (plus de collision PERCENT/LBRACKET → LBKT).
macros:
  mac_lang_switch:
    note: 'À mapper selon ton choix macOS : ex. Globe, Ctrl+Space, ou Cmd+Space'
  mac_screenshot:
    note: 'À mapper selon ton besoin : ex. Cmd+Shift+4'
notes:
- Le firmware envoie des codes HID « position US QWERTY » (ex. &kp Q) ; macOS avec clavier FR ISO réinterprète
  en AZERTY à l’écran.
- 'kp_rN1…kp_rN0 : tap = symbole US (! @ # …), shift+tap = chiffre (voir specialkeys.dtsi) — légendes
  FR dans keymap-drawer viennent du CSV locale.'
- MAIN = mapping id → action sous layers.MAIN ; autres couches = bindings_zmk.
- Schéma physique et 66 arguments d’entrée SOFLE60 ne se superposent pas ligne à ligne ; pour tracer une sortie
  ZMK vers un id lisible, utiliser sofle60.output_sequence_60 + output_index_to_physical_id (données outil).
- Un transpileur devrait charger zmk_stack.layout_includes avant de résoudre les behaviors personnalisés.
- Les alias « lettres AZERTY → HID » décrivent la sémantique hôte ; la keymap ZMK actuelle utilise surtout des &kp
  sur les symboles US (Q, W, …), ce qui est équivalent une fois macOS en disposition Français.
