# SPDX-License-Identifier: MIT
# Généré / synchronisé avec config/layout/standard_layout.dtsi

meta:
  format: zmk-dsl-v1
  schema_version: 6
  keyboard: sofle-60
  firmware: zmk
  zmk_source: config/layout/standard_layout.dtsi
  locale_map_csv: support/locale-maps/osx/fr_azerty_iso.csv
  host:
    os: macos
    locale: fr-ISO
    logical_layout: azerty
  canonical_config: true
  note: >
    MAIN : une entrée par touche nommée (L00, R10, I18_LHYP, LT3…) — pas de liste à indexer. Ordre des clés dans
    le fichier = ordre SOFLE60 pour lecture linéaire. Autres couches : bindings_zmk.
  macro_reference_only: config/sofle.keymap
  macro_reference_note: >
    SOFLE60 est un #define C : les noms K00…K65 ci-dessous sont uniquement les paramètres formels de la macro.
    Ils ne sont pas des « touches » à recopier dans une couche : la macro retire certains arguments des rangées 2–3
    visuelles en entrée et réordonne (voir commentaire dans sofle.keymap). Le YAML n’a pas besoin de dupliquer cette
    logique dans une section wiring : un transpileur l’implémente une fois à partir de sofle.keymap.
settings:
  alias_resolution: strict
  unknown_alias_policy: error
  unused_physical_key_policy: allow
  comments: true
dsl_human:
  read_me: |
    Chaque clé sous layers.MAIN est un id physique (repère clavier). La valeur est l’action, un seul niveau.
    kp_rN* → &kp_rN* ; FR_* → &kp + aliases_fr ; mot nu → &behavior ; none → &none ;
    LHM4(A), P_*_QWT, AS(V) → macro telle quelle ; lt / hlr / hmr → sous-clés layer|mod + tap (FR_*).
    LT0 opttildepipe / RC(4,11) &kp LA(LS(DOT)) — macOS FR : ⌥n→~, ⇧+⌥L→| ; ⌥⇧.→\ (voir standard_layout.dtsi).
    U46 / U47 : arguments SOFLE60 sans effet sur la matrice (none) — voir sofle.keymap.
  aliases_fr:
    FR_RBKT: RBKT
    FR_TAB: TAB
    FR_Q: Q
    FR_W: W
    FR_E: E
    FR_R: R
    FR_T: T
    FR_Y: Y
    FR_U: U
    FR_I: I
    FR_O: O
    FR_P: P
    FR_MINUS_KEY: MINUS
    FR_GRAVE: GRAVE
    FR_G: G
    FR_H: H
    FR_C: C
    FR_B: B
    FR_N: N
    FR_M: M
    FR_COMMA: COMMA
    FR_U_GRAVE: SQT
    FR_ESC: ESC
    FR_ENTER: ENTER
    FR_SPACE: SPACE
    FR_EQUAL: EQUAL
zmk_stack:
  entry: config/sofle.keymap
  layout_includes:
  - config/layout/standard_layout.dtsi
  - config/layout/specialkeys.dtsi
  - config/layout/homerowmods.dtsi
  - config/layout/autoshift.dtsi
  - config/layout/keymap_drawer.dtsi
regeneration:
  when: Après toute modification de standard_layout.dtsi (blocs SOFLE60).
  how: >
    MAIN : éditer le mapping nommé sous layers.MAIN (hors display_name). Autres couches : bindings_zmk.
