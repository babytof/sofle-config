meta:
  format: zmk-dsl-v1
  keyboard: sofle-60
  firmware: zmk
  host:
    os: macos
    locale: fr-ISO
    logical_layout: azerty
  layers:
    - id: 0
      name: main

settings:
  alias_resolution: strict
  unknown_alias_policy: error
  unused_physical_key_policy: allow
  comments: true

# -------------------------------------------------------------------
# ALIAS LOGIQUES
# -------------------------------------------------------------------
# Principe :
# - label   : nom humain / logique
# - type    : keycode | macro | special
# - value   : cible backend ZMK
# - mods    : modificateurs éventuels à ajouter
# - note    : utile pour documenter le layout
#
# Ici, les lettres suivent un hôte macOS AZERTY/ISO :
# par ex. A -> Q côté HID, Z -> W, Q -> A, etc.
# -------------------------------------------------------------------

aliases:
  # ---------- lettres ----------
  A:   { type: keycode, value: Q,           note: "AZERTY A -> HID Q" }
  Z:   { type: keycode, value: W,           note: "AZERTY Z -> HID W" }
  E:   { type: keycode, value: E }
  R:   { type: keycode, value: R }
  T:   { type: keycode, value: T }
  Y:   { type: keycode, value: Y }
  U:   { type: keycode, value: U }
  I:   { type: keycode, value: I }
  O:   { type: keycode, value: O }
  P:   { type: keycode, value: P }

  Q:   { type: keycode, value: A,           note: "AZERTY Q -> HID A" }
  S:   { type: keycode, value: S }
  D:   { type: keycode, value: D }
  F:   { type: keycode, value: F }
  G:   { type: keycode, value: G }
  H:   { type: keycode, value: H }
  J:   { type: keycode, value: J }
  K:   { type: keycode, value: K }
  L:   { type: keycode, value: L }
  M:   { type: keycode, value: SEMI,        note: "AZERTY M -> HID ;" }

  W:   { type: keycode, value: Z,           note: "AZERTY W -> HID Z" }
  X:   { type: keycode, value: X }
  C:   { type: keycode, value: C }
  V:   { type: keycode, value: V }
  B:   { type: keycode, value: B }
  N:   { type: keycode, value: N }

  # ---------- ligne des chiffres / symboles FR ----------
  AMP:        { type: keycode, value: N1,               note: "&" }
  ONE:        { type: keycode, value: N1, mods: [LSHFT], note: "1" }

  EACUTE:     { type: keycode, value: N2,               note: "é" }
  TWO:        { type: keycode, value: N2, mods: [LSHFT], note: "2" }

  DQUOTE:     { type: keycode, value: N3,               note: "\"" }
  THREE:      { type: keycode, value: N3, mods: [LSHFT], note: "3" }

  APOS:       { type: keycode, value: N4,               note: "'" }
  FOUR:       { type: keycode, value: N4, mods: [LSHFT], note: "4" }

  LPAR:       { type: keycode, value: N5,               note: "(" }
  FIVE:       { type: keycode, value: N5, mods: [LSHFT], note: "5" }

  MINUS:      { type: keycode, value: N6,               note: "-" }
  SIX:        { type: keycode, value: N6, mods: [LSHFT], note: "6" }

  EGRAVE:     { type: keycode, value: N7,               note: "è" }
  SEVEN:      { type: keycode, value: N7, mods: [LSHFT], note: "7" }

  UNDERSCORE: { type: keycode, value: N8,               note: "_" }
  EIGHT:      { type: keycode, value: N8, mods: [LSHFT], note: "8" }

  CCEDIL:     { type: keycode, value: N9,               note: "ç" }
  NINE:       { type: keycode, value: N9, mods: [LSHFT], note: "9" }

  AGRAVE:     { type: keycode, value: N0,               note: "à" }
  ZERO:       { type: keycode, value: N0, mods: [LSHFT], note: "0" }

  RPAR:       { type: keycode, value: MINUS,            note: ")" }
  DEGREE:     { type: keycode, value: MINUS, mods: [LSHFT], note: "°" }

  EQUAL:      { type: keycode, value: EQUAL,            note: "=" }
  PLUS:       { type: keycode, value: EQUAL, mods: [LSHFT], note: "+" }

  PERCENT:    { type: keycode, value: LBKT,             note: "%" }
  UGRAVE:     { type: keycode, value: RBKT,             note: "ù" }

  ASTERISK:   { type: keycode, value: BSLH,             note: "*" }
  DOLLAR:     { type: keycode, value: BSLH, mods: [LSHFT], note: "$" }

  HASH:       { type: keycode, value: GRAVE,            note: "#" }
  AT:         { type: keycode, value: GRAVE, mods: [LSHFT], note: "@" }

  SLASH:      { type: keycode, value: COMMA,            note: "/" }
  QMARK:      { type: keycode, value: COMMA, mods: [LSHFT], note: "?" }

  COMMA:      { type: keycode, value: M,                note: "," }
  SEMICOLON:  { type: keycode, value: M, mods: [LSHFT], note: ";" }

  DOT:        { type: keycode, value: DOT,              note: "." }
  COLON:      { type: keycode, value: DOT, mods: [LSHFT], note: ":" }

  EXCL:       { type: keycode, value: SLASH,            note: "!" }
  SECTION:    { type: keycode, value: SLASH, mods: [LSHFT], note: "§" }

  BACKSLASH:  { type: keycode, value: NON_US_BSLH,      note: "\\" }
  PIPE:       { type: keycode, value: NON_US_BSLH, mods: [LSHFT], note: "|" }

  LBRACKET:   { type: keycode, value: LBKT,             note: "[" }
  LBRACE:     { type: keycode, value: LBKT, mods: [LSHFT], note: "{" }

  RBRACKET:   { type: keycode, value: RBKT,             note: "]" }
  RBRACE:     { type: keycode, value: RBKT, mods: [LSHFT], note: "}" }

  GRAVE:      { type: keycode, value: GRAVE,            note: "`" }

  # ---------- touches système / spéciales ----------
  TAB:        { type: keycode, value: TAB }
  ESC:        { type: keycode, value: ESC }
  ENTER:      { type: keycode, value: ENTER }
  SPACE:      { type: keycode, value: SPACE }
  BSPC:       { type: keycode, value: BACKSPACE }

  LGUI:       { type: keycode, value: LGUI,  note: "Commande macOS" }
  LALT:       { type: keycode, value: LALT,  note: "Option macOS" }
  LCTRL:      { type: keycode, value: LCTRL, note: "Contrôle macOS" }
  LSHIFT:     { type: keycode, value: LSHFT }

  HYPER:      { type: special, value: HYPER, note: "Ctrl+Shift+Alt+Cmd" }
  NO:         { type: special, value: NONE }
  TRANS:      { type: special, value: TRANSPARENT }

  # ---------- alias métier faciles à relire ----------
  LANG_SWITCH: { type: macro, value: mac_lang_switch, note: "Changement de langue/saisie" }
  SCREENSHOT:  { type: macro, value: mac_screenshot,  note: "Capture d'écran macOS" }
  V_SHIFT:     { type: keycode, value: V, mods: [LSHFT], note: "V majuscule" }

# -------------------------------------------------------------------
# TOUCHES PHYSIQUES
# -------------------------------------------------------------------
# Nommage :
#   Lxy / Rxy   = matrice principale
#   LTn / RTn   = cluster pouces
#
# Convention retenue :
# - 4 lignes x 6 colonnes par demi-clavier = 48
# - 6 touches pouces par demi-clavier = 12
# - total = 60
# -------------------------------------------------------------------

physical_keys:
  # gauche matrice
  L00: { hand: left,  row: 0, col: 0, zone: matrix }
  L01: { hand: left,  row: 0, col: 1, zone: matrix }
  L02: { hand: left,  row: 0, col: 2, zone: matrix }
  L03: { hand: left,  row: 0, col: 3, zone: matrix }
  L04: { hand: left,  row: 0, col: 4, zone: matrix }
  L05: { hand: left,  row: 0, col: 5, zone: matrix }

  L10: { hand: left,  row: 1, col: 0, zone: matrix }
  L11: { hand: left,  row: 1, col: 1, zone: matrix }
  L12: { hand: left,  row: 1, col: 2, zone: matrix }
  L13: { hand: left,  row: 1, col: 3, zone: matrix }
  L14: { hand: left,  row: 1, col: 4, zone: matrix }
  L15: { hand: left,  row: 1, col: 5, zone: matrix }

  L20: { hand: left,  row: 2, col: 0, zone: matrix }
  L21: { hand: left,  row: 2, col: 1, zone: matrix }
  L22: { hand: left,  row: 2, col: 2, zone: matrix }
  L23: { hand: left,  row: 2, col: 3, zone: matrix }
  L24: { hand: left,  row: 2, col: 4, zone: matrix }
  L25: { hand: left,  row: 2, col: 5, zone: matrix }

  L30: { hand: left,  row: 3, col: 0, zone: matrix }
  L31: { hand: left,  row: 3, col: 1, zone: matrix }
  L32: { hand: left,  row: 3, col: 2, zone: matrix }
  L33: { hand: left,  row: 3, col: 3, zone: matrix }
  L34: { hand: left,  row: 3, col: 4, zone: matrix }
  L35: { hand: left,  row: 3, col: 5, zone: matrix }

  # droite matrice
  R00: { hand: right, row: 0, col: 0, zone: matrix }
  R01: { hand: right, row: 0, col: 1, zone: matrix }
  R02: { hand: right, row: 0, col: 2, zone: matrix }
  R03: { hand: right, row: 0, col: 3, zone: matrix }
  R04: { hand: right, row: 0, col: 4, zone: matrix }
  R05: { hand: right, row: 0, col: 5, zone: matrix }

  R10: { hand: right, row: 1, col: 0, zone: matrix }
  R11: { hand: right, row: 1, col: 1, zone: matrix }
  R12: { hand: right, row: 1, col: 2, zone: matrix }
  R13: { hand: right, row: 1, col: 3, zone: matrix }
  R14: { hand: right, row: 1, col: 4, zone: matrix }
  R15: { hand: right, row: 1, col: 5, zone: matrix }

  R20: { hand: right, row: 2, col: 0, zone: matrix }
  R21: { hand: right, row: 2, col: 1, zone: matrix }
  R22: { hand: right, row: 2, col: 2, zone: matrix }
  R23: { hand: right, row: 2, col: 3, zone: matrix }
  R24: { hand: right, row: 2, col: 4, zone: matrix }
  R25: { hand: right, row: 2, col: 5, zone: matrix }

  R30: { hand: right, row: 3, col: 0, zone: matrix }
  R31: { hand: right, row: 3, col: 1, zone: matrix }
  R32: { hand: right, row: 3, col: 2, zone: matrix }
  R33: { hand: right, row: 3, col: 3, zone: matrix }
  R34: { hand: right, row: 3, col: 4, zone: matrix }
  R35: { hand: right, row: 3, col: 5, zone: matrix }

  # pouces gauche
  LT0: { hand: left,  thumb: true, index: 0, zone: thumb }
  LT1: { hand: left,  thumb: true, index: 1, zone: thumb }
  LT2: { hand: left,  thumb: true, index: 2, zone: thumb }
  LT3: { hand: left,  thumb: true, index: 3, zone: thumb }
  LT4: { hand: left,  thumb: true, index: 4, zone: thumb }
  LT5: { hand: left,  thumb: true, index: 5, zone: thumb }

  # pouces droite
  RT0: { hand: right, thumb: true, index: 0, zone: thumb }
  RT1: { hand: right, thumb: true, index: 1, zone: thumb }
  RT2: { hand: right, thumb: true, index: 2, zone: thumb }
  RT3: { hand: right, thumb: true, index: 3, zone: thumb }
  RT4: { hand: right, thumb: true, index: 4, zone: thumb }
  RT5: { hand: right, thumb: true, index: 5, zone: thumb }

# -------------------------------------------------------------------
# COMPORTEMENTS RÉUTILISABLES
# -------------------------------------------------------------------

behaviors:
  tap:
    type: kp

  mod_tap:
    type: mt
    params:
      hold: required
      target: required

  macro_ref:
    type: macro
    params:
      target: required

  special_ref:
    type: special
    params:
      target: required

# -------------------------------------------------------------------
# MACROS
# -------------------------------------------------------------------
# Références symboliques uniquement ici.
# Le backend ZMK pourra les convertir vers tes behaviors/macros réelles.
# -------------------------------------------------------------------

macros:
  mac_lang_switch:
    note: "À mapper selon ton choix macOS : ex. Globe, Ctrl+Space, ou Cmd+Space"

  mac_screenshot:
    note: "À mapper selon ton besoin : ex. Cmd+Shift+4"

# -------------------------------------------------------------------
# LAYER 0 : main
# -------------------------------------------------------------------
# J’ai repris la logique visible sur ton image :
# - rangée du haut = symboles/chiffres AZERTY
# - lettres AZERTY sur les rangées centrales
# - quelques touches système / hyper / utilitaires
# - les positions ambiguës restent nommées clairement pour être simples à ajuster
# -------------------------------------------------------------------

layers:
  main:
    # -------------------- gauche --------------------
    L00: { use: tap, target: LBRACKET }     # image: [ / {
    L01: { use: tap, target: AMP }          # & / 1
    L02: { use: tap, target: EACUTE }       # é / 2
    L03: { use: tap, target: DQUOTE }       # " / 3
    L04: { use: tap, target: APOS }         # ' / 4
    L05: { use: tap, target: LPAR }         # ( / 5

    L10: { use: tap, target: TAB }
    L11: { use: tap, target: A }
    L12: { use: tap, target: Z }
    L13: { use: tap, target: E }
    L14: { use: tap, target: R }
    L15: { use: tap, target: T }

    L20: { use: tap, target: HASH }         # image: # / @
    L21: { use: tap, target: Q }
    L22: { use: tap, target: S }
    L23: { use: tap, target: D }
    L24: { use: tap, target: F }
    L25: { use: tap, target: G }

    L30: { use: macro_ref, target: LANG_SWITCH }   # image: touche système/langue
    L31: { use: macro_ref, target: SCREENSHOT }    # image: touche utilitaire mac
    L32: { use: tap, target: X }
    L33: { use: tap, target: C }
    L34: { use: tap, target: V_SHIFT }      # image: ⇧V
    L35: { use: tap, target: B }

    # pouces gauche
    LT0: { use: special_ref, target: NO }
    LT1: { use: tap, target: LGUI }
    LT2: { use: tap, target: LALT }
    LT3: { use: tap, target: LCTRL }
    LT4: { use: tap, target: ESC }
    LT5: { use: special_ref, target: NO }

    # -------------------- droite --------------------
    R00: { use: tap, target: MINUS }        # - / 6
    R01: { use: tap, target: EGRAVE }       # è / 7
    R02: { use: tap, target: UNDERSCORE }   # _ / 8
    R03: { use: tap, target: CCEDIL }       # ç / 9
    R04: { use: tap, target: AGRAVE }       # à / 0
    R05: { use: tap, target: ASTERISK }     # * / $

    R10: { use: tap, target: Y }
    R11: { use: tap, target: U }
    R12: { use: tap, target: I }
    R13: { use: tap, target: O }
    R14: { use: tap, target: P }
    R15: { use: tap, target: RPAR }         # ) / °

    R20: { use: tap, target: H }
    R21: { use: tap, target: J }
    R22: { use: tap, target: K }
    R23: { use: tap, target: L }
    R24: { use: tap, target: M }
    R25: { use: tap, target: PERCENT }      # % / ù

    R30: { use: tap, target: N }
    R31: { use: tap, target: QMARK }        # ? / ,
    R32: { use: tap, target: SEMICOLON }    # ; / .
    R33: { use: tap, target: COLON }        # : / /
    R34: { use: tap, target: SECTION }      # § / !
    R35: { use: tap, target: EQUAL }        # = / +

    # pouces droite
    RT0: { use: special_ref, target: NO }
    RT1: { use: tap, target: ENTER }
    RT2: { use: macro_ref, target: LANG_SWITCH }
    RT3: { use: tap, target: BSPC }
    RT4: { use: special_ref, target: NO }
    RT5: { use: special_ref, target: NO }

# -------------------------------------------------------------------
# NOTES
# -------------------------------------------------------------------
notes:
  - "Les alias lettres sont déjà pensés pour un hôte macOS AZERTY/ISO."
  - "Les alias symboles utilisent une convention backend ZMK de type HID + mods."
  - "Les touches ambiguës de l’image ont été conservées avec des noms explicites faciles à retoucher."
  - "Si tu préfères, on peut ensuite générer un backend ZMK .keymap à partir de ce DSL."
  